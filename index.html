<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SV Logística - Checklist</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#005697">
    <style>
        :root { --sv-blue: #005697; --sv-yellow: #FDB813; --sv-bg: #f4f6f9; --sv-text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--sv-bg); margin: 0; padding: 0; padding-top: env(safe-area-inset-top); display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 480px; min-height: 100vh; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: var(--sv-blue); color: var(--sv-yellow); padding: 20px; text-align: center; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; }
        .header img { max-width: 140px; height: auto; display: block; margin: 0 auto 10px; }
        .p-20 { padding: 25px 20px; flex: 1; }
        .screen { display: none; }
        .active { display: block; }
        label { display: block; margin: 15px 0 5px; font-weight: 700; color: var(--sv-blue); font-size: 0.85rem; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; border: 2px solid #e1e5eb; border-radius: 10px; box-sizing: border-box; font-size: 16px; margin-bottom: 12px; background: #fdfdfd; }
        #banner { background: #e1f0ff; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; font-weight: bold; color: var(--sv-blue); text-align: center; border: 1px solid #c2e0ff; }
        .category-block { background: #fff; border-radius: 10px; margin: 15px 0; border: 2px solid #e1e5eb; overflow: hidden; }
        .category-title { background: #f1f3f6; font-weight: 800; color: #1a1d20; padding: 10px 15px; font-size: 12px; border-bottom: 2px solid #e1e5eb; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #eee; }
        button { width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: 800; font-size: 16px; text-transform: uppercase; cursor: pointer; }
        .btn-main { background: var(--sv-yellow); color: #1a1d20; margin-top: 15px; }
        .btn-back { background: #e1e5eb; color: var(--sv-text); margin-top: 10px; font-size: 13px; }
        .loading { text-align: center; padding: 40px; color: var(--sv-blue); font-weight: 600; }
        .res-check { width: auto; min-width: 85px; padding: 5px; height: auto; border: 1px solid #ccc; margin: 0; }
    </style>
</head>
<body>
<div class="app-card">
    <div class="header">
        <img src="logo.png" alt="SV Logística">
        CHECKLIST DE FROTA
    </div>
    <div class="p-20">
        <div id="tela1" class="screen active">
            <div id="statusLoad" class="loading">Iniciando sistema...</div>
            <div id="formInicial" style="display:none;">
                <label>Operador</label>
                <input type="text" id="operador" placeholder="Nome completo">
                <label>Tipo da Máquina</label>
                <select id="tipoMaquina" onchange="filtraIDs()"><option value="">Selecione...</option></select>
                <label>ID da Máquina</label>
                <select id="idMaquina"><option value="">Selecione o tipo primeiro...</option></select>
                <button class="btn-main" onclick="irParaChecklist()">INICIAR INSPEÇÃO</button>
            </div>
        </div>
        <div id="tela2" class="screen">
            <div id="banner"></div>
            <div id="checklistArea"></div>
            <label>Observações</label>
            <textarea id="obs" rows="3"></textarea>
            <button id="btnSalvar" class="btn-main" onclick="salvar()">FINALIZAR E ENVIAR</button>
            <button class="btn-back" onclick="location.reload()">VOLTAR / CANCELAR</button>
        </div>
    </div>
</div>
<script>
    // ⚠️ ATUALIZE SUA URL ABAIXO:
    const URL_API = "https://script.google.com/macros/s/AKfycbxET9AKbWfotX9BAi2VE59MRcRP9DfjUedFCEdvNofolZmA8_fR-VFkotHR7MFPrX5P/exec"; 

    let dMaquinas = [];
    let dItens = [];

    window.onload = async () => {
        try {
            const res = await fetch(URL_API);
            const data = await res.json();
            dMaquinas = data.maquinas;
            dItens = data.itens;
            const selTipo = document.getElementById('tipoMaquina');
            selTipo.innerHTML = '<option value="">Selecione...</option>';
            const tipos = [...new Set(dMaquinas.map(m => m.tipo_maquina))];
            tipos.forEach(t => { if(t) selTipo.innerHTML += `<option value="${t}">${t}</option>`; });
            document.getElementById('statusLoad').style.display = 'none';
            document.getElementById('formInicial').style.display = 'block';
        } catch (e) {
            document.getElementById('statusLoad').innerText = "Erro ao conectar. Recarregue a página.";
        }
    };

    function filtraIDs() {
        const tipo = document.getElementById('tipoMaquina').value;
        const selID = document.getElementById('idMaquina');
        selID.innerHTML = '<option value="">Selecione...</option>';
        dMaquinas.filter(m => m.tipo_maquina === tipo).forEach(m => {
            selID.innerHTML += `<option value="${m.id_maquina}">${m.id_maquina}</option>`;
        });
    }

    function irParaChecklist() {
        const op = document.getElementById('operador').value;
        const id = document.getElementById('idMaquina').value;
        const tipo = document.getElementById('tipoMaquina').value;
        if(!op || !id) return alert("Preencha Operador e ID!");
        const maq = dMaquinas.find(m => m.id_maquina === id);
        document.getElementById('banner').innerText = `ID: ${id} | PLACA: ${maq.placa || 'N/A'}`;
        const area = document.getElementById('checklistArea');
        area.innerHTML = "";
        const itensF = dItens.filter(i => i.tipo_maquina === tipo);
        const cats = [...new Set(itensF.map(i => i.categoria))];
        cats.forEach(c => {
            let h = `<div class="category-block"><div class="category-title">${c}</div>`;
            itensF.filter(i => i.categoria === c).forEach(item => {
                h += `<div class="item-row"><span>${item.item}</span>
                    <select class="res-check" data-name="${item.item}">
                        <option value="OK">OK</option><option value="NOK">NOK</option>
                    </select></div>`;
            });
            area.innerHTML += h + `</div>`;
        });
        document.getElementById('tela1').classList.remove('active');
        document.getElementById('tela2').classList.add('active');
        window.scrollTo(0,0);
    }

    async function salvar() {
        const btn = document.getElementById('btnSalvar');
        btn.disabled = true; btn.innerText = "ENVIANDO...";
        const resps = Array.from(document.querySelectorAll('.res-check'))
            .map(s => { return { item: s.dataset.name, status: s.value }; });
        const payload = {
            operador: document.getElementById('operador').value,
            tipoMaquina: document.getElementById('tipoMaquina').value,
            idMaquina: document.getElementById('idMaquina').value,
            placa: dMaquinas.find(m => m.id_maquina === document.getElementById('idMaquina').value).placa,
            respostas: resps,
            observacao: document.getElementById('obs').value
        };
        try {
            await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("✅ Checklist SV Salvo com sucesso!");
            location.reload();
        } catch (err) {
            alert("Erro ao salvar.");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
