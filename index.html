<div id="tela1" class="card">
    <label>Operador</label>
    <input type="text" id="operador" placeholder="Seu nome">

    <label>Tipo da Máquina</label>
    <select id="tipoMaquina" onchange="atualizarIDs()">
        <option value="">Selecione o Tipo...</option>
    </select>

    <label>ID Máquina</label>
    <select id="idMaquina">
        <option value="">Aguardando tipo...</option>
    </select>

    <button onclick="irParaChecklist()" style="margin-top:10px; background:#007bff">Próximo: Itens do Checklist</button>
</div>

<div id="tela2" class="card" style="display:none">
    <h3 id="infoCabecalho"></h3>
    <div id="containerItens"></div>
    
    <label>Observações</label>
    <textarea id="observacao"></textarea>
    
    <button id="btnEnviar" onclick="enviarFinal()">Finalizar Checklist</button>
    <button onclick="location.reload()" style="background:#666; margin-top:5px">Voltar</button>
</div>
