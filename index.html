<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist SV Logística</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="logo.png" alt="Logo SV" class="logo">
            <h1>Checklist de Frota</h1>
        </header>

        <form id="formChecklist">
            <div class="card">
                <label>Operador</label>
                <input type="text" id="operador" required placeholder="Nome completo">
                
                <label>Veículo / Máquina</label>
                <select id="maquina" required>
                    <option value="">Carregando máquinas...</option>
                </select>

                <label>Placa</label>
                <input type="text" id="placa" readonly class="input-readonly">
            </div>

            <div id="itensChecklist" class="card">
                <h3>Itens de Inspeção</h3>
                </div>

            <div class="card">
                <label>Observações</label>
                <textarea id="observacao" placeholder="Descreva qualquer irregularidade..."></textarea>
            </div>

            <button type="submit" id="btnEnviar">Finalizar e Salvar na Planilha</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
