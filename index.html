<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SV Gestão de Frota</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#005697">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        :root { --sv-blue: #005697; --sv-yellow: #FDB813; --sv-bg: #f4f6f9; --sv-text: #333; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--sv-bg); margin: 0; padding: 0; padding-top: env(safe-area-inset-top); display: flex; justify-content: center; overflow-x: hidden; }

        /* SPLASH SCREEN */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--sv-blue); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.6s ease;
        }
        #splash img { width: 160px; animation: pulse 2s infinite; }
        #splash p { color: var(--sv-yellow); font-weight: bold; margin-top: 20px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
        
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        .app-card { width: 100%; max-width: 500px; min-height: 100vh; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; }
        
        .header { background: var(--sv-blue); color: var(--sv-yellow); padding: 20px; text-align: center; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; }
        .header img { max-width: 130px; height: auto; display: block; margin: 0 auto 10px; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3)); }
        
        .p-20 { padding: 25px 20px; flex: 1; }
        .screen { display: none; }
        .active { display: block; }
        
        label { display: block; margin: 15px 0 5px; font-weight: 700; color: var(--sv-blue); font-size: 0.85rem; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; border: 2px solid #e1e5eb; border-radius: 10px; box-sizing: border-box; font-size: 16px; margin-bottom: 12px; background: #fdfdfd; }
        
        .btn-main { background: var(--sv-yellow); color: #1a1d20; width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: 800; font-size: 16px; text-transform: uppercase; cursor: pointer; margin-top: 15px; }
        .btn-nav { background: #e1e5eb; color: var(--sv-blue); width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 13px; text-align: center; }
        
        /* Checklist */
        .category-block { background: #fff; border-radius: 10px; margin: 15px 0; border: 2px solid #e1e5eb; overflow: hidden; }
        .category-title { background: #f1f3f6; font-weight: 800; color: #1a1d20; padding: 10px 15px; font-size: 12px; border-bottom: 2px solid #e1e5eb; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #eee; }
        .res-check { width: auto; min-width: 85px; padding: 5px; height: auto; border: 1px solid #ccc; margin: 0; }

        /* Dashboard */
        .dash-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .dash-title { font-size: 11px; color: #777; text-transform: uppercase; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: var(--sv-blue); }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="splash">
    <img src="logo.png" alt="SV Logística">
    <p>Sincronizando SV Frota...</p>
</div>

<div class="app-card">
    <div class="header">
        <img src="logo.png" alt="SV Logística">
        SISTEMA DE GESTÃO SV
    </div>

    <div class="p-20">
        <div id="tela1" class="screen active">
            <label>Operador / Coordenador</label>
            <input type="text" id="operador" placeholder="Seu nome completo">
            
            <label>Tipo da Máquina</label>
            <select id="tipoMaquina" onchange="filtraIDs()">
                <option value="">Selecione...</option>
            </select>
            
            <label>ID da Máquina</label>
            <select id="idMaquina">
                <option value="">Selecione o tipo primeiro...</option>
            </select>
            
            <button class="btn-main" onclick="irParaChecklist()">INICIAR INSPEÇÃO</button>
            <button class="btn-nav" onclick="abrirDash()">DASHBOARD DE GESTÃO</button>
        </div>

        <div id="tela2" class="screen">
            <div id="banner" style="background:#e1f0ff; padding:12px; border-radius:10px; margin-bottom:15px; font-size:13px; font-weight:bold; color:var(--sv-blue); text-align:center;"></div>
            <div id="checklistArea"></div>
            
            <label>Observações Gerais</label>
            <textarea id="obs" rows="3" placeholder="Relate avarias aqui..."></textarea>
            
            <button id="btnSalvar" class="btn-main" onclick="salvar()">FINALIZAR E ENVIAR</button>
            <button class="btn-nav" onclick="location.reload()">CANCELAR E VOLTAR</button>
        </div>

        <div id="telaDash" class="screen">
            <h3 style="color: var(--sv-blue); margin: 0 0 15px 0;">Resumo Operacional</h3>
            
            <div class="filter-grid">
                <div>
                    <label>Período</label>
                    <select id="fPeriodo" onchange="renderDash()">
                        <option value="7">Últimos 7 dias</option>
                        <option value="15">Últimos 15 dias</option>
                        <option value="30" selected>Últimos 30 dias</option>
                        <option value="0">Todo Histórico</option>
                    </select>
                </div>
                <div>
                    <label>Operador</label>
                    <select id="fOperador" onchange="renderDash()">
                        <option value="">Todos</option>
                    </select>
                </div>
            </div>

            <div class="dash-card">
                <div class="dash-title">Checklists Enviados</div>
                <div id="totalChecks" class="stat-number">0</div>
            </div>

            <div class="dash-card">
                <div class="dash-title">Saúde da Frota (Geral)</div>
                <canvas id="chartPizza" height="220"></canvas>
            </div>

            <div class="dash-card">
                <div class="dash-title">Ranking de Falhas (Itens NOK)</div>
                <canvas id="chartBarras" height="250"></canvas>
            </div>

            <button class="btn-nav" onclick="location.reload()">SAIR DO DASHBOARD</button>
        </div>
    </div>
</div>

<script>
    // ⚠️ COLOQUE SUA URL DO GOOGLE SCRIPT ABAIXO ENTRE AS ASPAS:
    const URL_API = "https://script.google.com/macros/s/AKfycbw4kN_V5JVZjk6nvHnqwE_mE86SInwgCtoeCnWRS10k_KCVPUhY9lIKDOfMZBDA0vKp/exec"; 

    let dMaquinas = [], dItens = [], dHistorico = [], chartP, chartB;

    // Registrar plugin de números nos gráficos
    Chart.register(ChartDataLabels);

    window.onload = async () => {
        try {
            const res = await fetch(URL_API);
            const data = await res.json();
            
            dMaquinas = data.maquinas || [];
            dItens = data.itens || [];
            dHistorico = data.historico || [];
            
            // Carregar Select de Tipos
            const selT = document.getElementById('tipoMaquina');
            const tipos = [...new Set(dMaquinas.map(m => m.tipo_maquina))];
            tipos.forEach(t => { if(t) selT.innerHTML += `<option value="${t}">${t}</option>`; });
            
            // Carregar Select de Operadores no Dash
            const opSel = document.getElementById('fOperador');
            const ops = [...new Set(dHistorico.map(h => h.operador))];
            ops.forEach(op => { if(op) opSel.innerHTML += `<option value="${op}">${op}</option>`; });

            // Remover Splash Screen
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            setTimeout(() => { splash.style.display = 'none'; }, 600);

        } catch (e) {
            document.getElementById('splash').innerHTML = "<p style='color:white; padding:20px; text-align:center;'>ERRO DE CONEXÃO<br>Verifique a URL do Script ou sua internet.</p>";
        }
    };

    function filtraIDs() {
        const t = document.getElementById('tipoMaquina').value;
        const s = document.getElementById('idMaquina');
        s.innerHTML = '<option value="">Selecione...</option>';
        dMaquinas.filter(m => m.tipo_maquina === t).forEach(m => {
            s.innerHTML += `<option value="${m.id_maquina}">${m.id_maquina}</option>`;
        });
    }

        const op = document.getElementById('operador').value;
        const id = document.getElementById('idMaquina').value;
        const tipoOriginal = document.getElementById('tipoMaquina').
