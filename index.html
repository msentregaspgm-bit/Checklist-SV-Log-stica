<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SV Logística - Frota</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --sv-blue: #005697; --sv-yellow: #FDB813; --sv-bg: #f4f6f9; --sv-text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--sv-bg); margin: 0; padding: 0; padding-top: env(safe-area-inset-top); display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 500px; min-height: 100vh; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: var(--sv-blue); color: var(--sv-yellow); padding: 20px; text-align: center; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; }
        .header img { max-width: 140px; height: auto; display: block; margin: 0 auto 10px; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3)); }
        .p-20 { padding: 25px 20px; flex: 1; }
        .screen { display: none; }
        .active { display: block; }
        label { display: block; margin: 15px 0 5px; font-weight: 700; color: var(--sv-blue); font-size: 0.85rem; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; border: 2px solid #e1e5eb; border-radius: 10px; box-sizing: border-box; font-size: 16px; margin-bottom: 12px; background: #fdfdfd; }
        .btn-main { background: var(--sv-yellow); color: #1a1d20; width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: 800; font-size: 16px; text-transform: uppercase; cursor: pointer; margin-top: 15px; }
        .btn-nav { background: #e1e5eb; color: var(--sv-blue); width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 13px; }
        .category-block { background: #fff; border-radius: 10px; margin: 15px 0; border: 2px solid #e1e5eb; overflow: hidden; }
        .category-title { background: #f1f3f6; font-weight: 800; color: #1a1d20; padding: 10px 15px; font-size: 12px; border-bottom: 2px solid #e1e5eb; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #eee; }
        .res-check { width: auto; min-width: 85px; padding: 5px; height: auto; border: 1px solid #ccc; margin: 0; }
        .loading { text-align: center; padding: 40px; color: var(--sv-blue); font-weight: 600; }
        
        /* Dashboard Styles */
        .dash-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .dash-title { font-size: 11px; color: #777; text-transform: uppercase; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #eee; }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: var(--sv-blue); }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; font-size: 12px; }
    </style>
</head>
<body>
<div class="app-card">
    <div class="header">
        <img src="logo.png" alt="SV Logística">
        CHECKLIST DE FROTA
    </div>
    <div class="p-20">
        <div id="tela1" class="screen active">
            <div id="statusLoad" class="loading">Iniciando sistema...</div>
            <div id="formInicial" style="display:none;">
                <label>Operador</label>
                <input type="text" id="operador" placeholder="Nome completo">
                <label>Tipo da Máquina</label>
                <select id="tipoMaquina" onchange="filtraIDs()"><option value="">Selecione...</option></select>
                <label>ID da Máquina</label>
                <select id="idMaquina"><option value="">Selecione o tipo primeiro...</option></select>
                <button class="btn-main" onclick="irParaChecklist()">INICIAR INSPEÇÃO</button>
                <button class="btn-nav" onclick="abrirDash()">VER DASHBOARD</button>
            </div>
        </div>

        <div id="tela2" class="screen">
            <div id="banner" style="background:#e1f0ff; padding:12px; border-radius:10px; margin-bottom:15px; font-size:13px; font-weight:bold; color:var(--sv-blue); text-align:center;"></div>
            <div id="checklistArea"></div>
            <label>Observações</label>
            <textarea id="obs" rows="3"></textarea>
            <button id="btnSalvar" class="btn-main" onclick="salvar()">FINALIZAR E ENVIAR</button>
            <button class="btn-nav" onclick="location.reload()">VOLTAR</button>
        </div>

        <div id="telaDash" class="screen">
            <h3 style="color: var(--sv-blue); margin-top: 0;">DASHBOARD GESTÃO</h3>
            <div class="filter-grid">
                <div><label>Início</label><input type="date" id="fDataInicio" onchange="renderDash()"></div>
                <div><label>Fim</label><input type="date" id="fDataFim" onchange="renderDash()"></div>
            </div>
            <div class="filter-grid">
                <div><label>Operador</label><select id="fOperador" onchange="renderDash()"><option value="">Todos</option></select></div>
                <div><label>Caminhão</label><select id="fCaminhao" onchange="renderDash()"><option value="">Todos</option></select></div>
            </div>
            <div class="dash-card">
                <div class="dash-title">Total de Inspeções</div>
                <div id="totalChecks" class="stat-number">0</div>
            </div>
            <div class="dash-card">
                <div class="dash-title">Status dos Itens (OK x NOK)</div>
                <canvas id="chartPizza" height="200"></canvas>
            </div>
            <div class="dash-card">
                <div class="dash-title">Ranking de Falhas</div>
                <canvas id="chartBarras" height="250"></canvas>
            </div>
            <button class="btn-nav" onclick="location.reload()">SAIR DO DASHBOARD</button>
        </div>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycby1TA5qgRDu7NAbgaSnIcK56lhZAVwVl9oELrc-WtBMZGzfOngA-emYxhWTnfMBdBO9/exec"; 
    let dMaquinas = [], dItens = [], dHistorico = [], chartP, chartB;

    window.onload = async () => {
        try {
            const res = await fetch(URL_API);
            const data = await res.json();
            dMaquinas = data.maquinas; dItens = data.itens; dHistorico = data.historico || [];
            
            // Popula Tipos de Máquina
            const selTipo = document.getElementById('tipoMaquina');
            const tipos = [...new Set(dMaquinas.map(m => m.tipo_maquina))];
            tipos.forEach(t => { if(t) selTipo.innerHTML += `<option value="${t}">${t}</option>`; });
            
            // Popula Filtros do Dash
            const opSel = document.getElementById('fOperador');
            const maqSel = document.getElementById('fCaminhao');
            [...new Set(dHistorico.map(h => h.operador))].forEach(op => { if(op) opSel.innerHTML += `<option value="${op}">${op}</option>`; });
            [...new Set(dMaquinas.map(m => m.id_maquina))].forEach(id => { if(id) maqSel.innerHTML += `<option value="${id}">${id}</option>`; });

            // Datas padrão do Dash
            const dF = new Date(); const dI = new Date(); dI.setDate(dF.getDate() - 30);
            document.getElementById('fDataInicio').value = dI.toISOString().split('T')[0];
            document.getElementById('fDataFim').value = dF.toISOString().split('T')[0];

            document.getElementById('statusLoad').style.display = 'none';
            document.getElementById('formInicial').style.display = 'block';
        } catch (e) { document.getElementById('statusLoad').innerText = "Erro ao carregar dados."; }
    };

    function filtraIDs() {
        const tipo = document.getElementById('tipoMaquina').value;
        const selID = document.getElementById('idMaquina');
        selID.innerHTML = '<option value="">Selecione...</option>';
        dMaquinas.filter(m => m.tipo_maquina === tipo).forEach(m => {
            selID.innerHTML += `<option value="${m.id_maquina}">${m.id_maquina}</option>`;
        });
    }

    function irParaChecklist() {
        const op = document.getElementById('operador').value, id = document.getElementById('idMaquina').value, t = document.getElementById('tipoMaquina').value;
        if(!op || !id) return alert("Preencha Operador e Máquina!");
        const maq = dMaquinas.find(m => m.id_maquina === id);
        document.getElementById('banner').innerText = `ID: ${id} | PLACA: ${maq.placa || 'N/A'}`;
        const area = document.getElementById('checklistArea'); area.innerHTML = "";
        const itensF = dItens.filter(i => i.tipo_maquina === t);
        const cats = [...new Set(itensF.map(i => i.categoria))];
        cats.forEach(c => {
            let h = `<div class="category-block"><div class="category-title">${c}</div>`;
            itensF.filter(i => i.categoria === c).forEach(it => {
                h += `<div class="item-row"><span>${it.item}</span><select class="res-check" data-name="${it.item}"><option value="OK">OK</option><option value="NOK">NOK</option></select></div>`;
            });
            area.innerHTML += h + `</div>`;
        });
        document.getElementById('tela1').classList.remove('active'); document.getElementById('tela2').classList.add('active');
        window.scrollTo(0,0);
    }

    async function salvar() {
        const btn = document.getElementById('btnSalvar'); if(btn.disabled) return;
        btn.disabled = true; btn.innerText = "ENVIANDO...";
        const resps = Array.from(document.querySelectorAll('.res-check')).map(s => { return { item: s.dataset.name, status: s.value }; });
        const payload = {
            operador: document.getElementById('operador').value,
            tipoMaquina: document.getElementById('tipoMaquina').value,
            idMaquina: document.getElementById('idMaquina').value,
            placa: dMaquinas.find(m => m.id_maquina === document.getElementById('idMaquina').value).placa,
            respostas: resps, observacao: document.getElementById('obs').value
        };
        try {
            await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("✅ Checklist Salvo!"); location.reload();
        } catch (e) { alert("Erro ao salvar."); btn.disabled = false; }
    }

    function abrirDash() {
        document.getElementById('tela1').classList.remove('active');
        document.getElementById('telaDash').classList.add('active');
        renderDash();
    }

    function renderDash() {
        const dataI = new Date(document.getElementById('fDataInicio').value);
        const dataF = new Date(document.getElementById('fDataFim').value); dataF.setHours(23, 59, 59);
        const opF = document.getElementById('fOperador').value, maqF = document.getElementById('fCaminhao').value;

        let filtrados = dHistorico.filter(d => {
            const dt = new Date(d.data);
            return dt >= dataI && dt <= dataF && (opF === "" || d.operador === opF) && (maqF === "" || d.id_maquina == maqF);
        });

        document.getElementById('totalChecks').innerText = new Set(filtrados.map(f => f.data + f.id_maquina)).size;

        let ok = 0, nok = 0, countItens = {};
        filtrados.forEach(f => {
            if(f.status === "OK") ok++; else { nok++; countItens[f.item] = (countItens[f.item] || 0) + 1; }
        });

        if(chartP) chartP.destroy();
        chartP = new Chart(document.getElementById('chartPizza'), {
            type: 'doughnut',
            data: { labels: ['OK', 'Falha'], datasets: [{ data: [ok, nok], backgroundColor: ['#28a745', '#d32f2f'] }] },
            options: { plugins: { legend: { position: 'bottom' } } }
        });

        const sortedItens = Object.entries(countItens).sort((a,b) => b[1] - a[1]).slice(0, 5);
        if(chartB) chartB.destroy();
        chartB = new Chart(document.getElementById('chartBarras'), {
            type: 'bar',
            data: { labels: sortedItens.map(i => i[0]), datasets: [{ label: 'Qtd NOK', data: sortedItens.map(i => i[1]), backgroundColor: '#005697' }] },
            options: { indexAxis: 'y', plugins: { legend: { display: false } } }
        });
    }
</script>
</body>
</html>
