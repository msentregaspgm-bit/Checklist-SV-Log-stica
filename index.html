<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV Logística - Checklist</title>
    <style>
        :root { --primary: #28a745; --dark: #1a1d20; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 450px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--dark); color: white; padding: 20px; text-align: center; font-weight: bold; }
        .p-20 { padding: 20px; }
        .screen { display: none; }
        .active { display: block; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .category-block { background: #fdfdfd; border-left: 5px solid var(--primary); padding: 15px; margin: 20px 0; border-radius: 6px; border: 1px solid #eee; }
        .category-title { font-weight: bold; color: #222; margin-bottom: 10px; text-transform: uppercase; font-size: 12px; border-bottom: 1px solid #eee; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dotted #ddd; }
        button { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; margin-top: 15px; }
        .btn-back { background: #6c757d; color: white; margin-top: 10px; }
        .loading { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">SV LOGÍSTICA - CHECKLIST</div>
    <div class="p-20">
        <div id="tela1" class="screen active">
            <div id="statusLoad" class="loading">Conectando à planilha...</div>
            <div id="formInicial" style="display:none;">
                <label>Operador</label>
                <input type="text" id="operador" placeholder="Seu nome">
                <label>Tipo da Máquina</label>
                <select id="tipoMaquina" onchange="filtraIDs()"><option value="">Carregando...</option></select>
                <label>ID Máquina</label>
                <select id="idMaquina"><option value="">Selecione o tipo...</option></select>
                <button class="btn-main" onclick="irParaChecklist()">PRÓXIMO</button>
            </div>
        </div>
        <div id="tela2" class="screen">
            <div id="banner" style="background:#e7f3ff; padding:10px; border-radius:6px; margin-bottom:15px; font-size:13px; font-weight:bold; color:#0056b3; text-align:center;"></div>
            <div id="checklistArea"></div>
            <label>Observações</label>
            <textarea id="obs" rows="3"></textarea>
            <button id="btnSalvar" class="btn-main" onclick="salvar()">SALVAR CHECKLIST</button>
            <button class="btn-back" onclick="location.reload()">VOLTAR</button>
        </div>
    </div>
</div>

<script>
    // ⚠️ COLE SUA URL ABAIXO:
    const URL_API = "https://script.google.com/macros/s/AKfycbwlP3RMI-zhPBAOW2YYZ7Q8GtaFpz8vIhjQyNzW71onJn_38mnYjtjgKE2J9VgvcNQr/exec"; 

    let dadosMaquinas = [];
    let dadosItens = [];

    window.onload = async () => {
        try {
            const res = await fetch(URL_API);
            const data = await res.json();
            dadosMaquinas = data.maquinas;
            dadosItens = data.itens;

            const selTipo = document.getElementById('tipoMaquina');
            selTipo.innerHTML = '<option value="">Selecione...</option>';
            const tipos = [...new Set(dadosMaquinas.map(m => m.tipo_maquina))];
            tipos.forEach(t => { if(t) selTipo.innerHTML += `<option value="${t}">${t}</option>`; });

            document.getElementById('statusLoad').style.display = 'none';
            document.getElementById('formInicial').style.display = 'block';
        } catch (e) {
            document.getElementById('statusLoad').innerText = "Erro ao carregar dados.";
        }
    };

    function filtraIDs() {
        const tipo = document.getElementById('tipoMaquina').value;
        const selID = document.getElementById('idMaquina');
        selID.innerHTML = '<option value="">Selecione...</option>';
        dadosMaquinas.filter(m => m.tipo_maquina === tipo).forEach(m => {
            selID.innerHTML += `<option value="${m.id_maquina}">${m.id_maquina}</option>`;
        });
    }

    function irParaChecklist() {
        const op = document.getElementById('operador').value;
        const id = document.getElementById('idMaquina').value;
        const tipo = document.getElementById('tipoMaquina').value;
        if(!op || !id) return alert("Preencha tudo!");

        const maq = dadosMaquinas.find(m => m.id_maquina === id);
        document.getElementById('banner').innerText = `ID: ${id} | PLACA: ${maq.placa || 'N/A'}`;

        const area = document.getElementById('checklistArea');
        area.innerHTML = "";
        
        const itensF = dadosItens.filter(i => i.tipo_maquina === tipo);
        const cats = [...new Set(itensF.map(i => i.categoria))];

        cats.forEach(c => {
            let h = `<div class="category-block"><div class="category-title">${c}</div>`;
            itensF.filter(i => i.categoria === c).forEach(item => {
                h += `<div class="item-row"><span>${item.item}</span>
                    <select class="res-check" data-name="${item.item}" style="width:80px; margin:0; padding:5px;">
                        <option value="OK">OK</option><option value="NOK">NOK</option>
                    </select></div>`;
            });
            area.innerHTML += h + `</div>`;
        });

        document.getElementById('tela1').classList.remove('active');
        document.getElementById('tela2').classList.add('active');
    }

    async function salvar() {
        const btn = document.getElementById('btnSalvar');
        btn.disabled = true; btn.innerText = "SALVANDO...";

        const resps = Array.from(document.querySelectorAll('.res-check'))
            .map(s => `${s.dataset.name}: ${s.value}`).join(" | ");

        const payload = {
            operador: document.getElementById('operador').value,
            tipoMaquina: document.getElementById('tipoMaquina').value,
            idMaquina: document.getElementById('idMaquina').value,
            placa: dadosMaquinas.find(m => m.id_maquina === document.getElementById('idMaquina').value).placa,
            respostas: resps,
            observacao: document.getElementById('obs').value
        };

        await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("Salvo!");
        location.reload();
    }
</script>
</body>
</html>
