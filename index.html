<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SV Logística - Gestão de Frota</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#005697">
    <style>
        :root { --sv-blue: #005697; --sv-yellow: #FDB813; --sv-bg: #f4f6f9; --sv-text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--sv-bg); margin: 0; padding: 0; padding-top: env(safe-area-inset-top); display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 500px; min-height: 100vh; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: var(--sv-blue); color: var(--sv-yellow); padding: 20px; text-align: center; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; }
        .header img { max-width: 130px; height: auto; display: block; margin: 0 auto 10px; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3)); }
        .p-20 { padding: 20px; flex: 1; }
        .screen { display: none; }
        .active { display: block; }
        
        /* Formulários */
        label { display: block; margin: 15px 0 5px; font-weight: 700; color: var(--sv-blue); font-size: 0.85rem; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; border: 2px solid #e1e5eb; border-radius: 10px; box-sizing: border-box; font-size: 16px; margin-bottom: 12px; }
        .btn-main { background: var(--sv-yellow); color: #1a1d20; width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: 800; font-size: 16px; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-nav { background: #e1e5eb; color: var(--sv-blue); font-size: 14px; margin-top: 15px; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        /* Estilos Checklist */
        .category-block { background: #fff; border-radius: 10px; margin: 15px 0; border: 2px solid #e1e5eb; overflow: hidden; }
        .category-title { background: #f1f3f6; font-weight: 800; padding: 10px 15px; font-size: 12px; border-bottom: 2px solid #e1e5eb; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #eee; }
        .res-check { width: auto; min-width: 85px; padding: 5px; }

        /* Estilos Dashboard */
        .dash-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .dash-title { font-size: 0.75rem; color: #777; text-transform: uppercase; font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: var(--sv-blue); }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: #aaa; font-size: 10px; padding: 5px 0; }
        td { padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
        .nok-count { color: #d32f2f; font-weight: bold; text-align: right; }
        .loading { text-align: center; padding: 50px; color: var(--sv-blue); font-weight: bold; }
    </style>
</head>
<body>
<div class="app-card">
    <div class="header">
        <img src="logo.png" alt="SV Logística">
        SISTEMA DE GESTÃO SV
    </div>

    <div class="p-20">
        <div id="tela1" class="screen active">
            <div id="statusLoad" class="loading">Sincronizando dados...</div>
            <div id="formInicial" style="display:none;">
                <label>Coordenador / Operador</label>
                <input type="text" id="operador" placeholder="Nome do responsável">
                <label>Tipo da Máquina</label>
                <select id="tipoMaquina" onchange="filtraIDs()"><option value="">Selecione...</option></select>
                <label>ID da Máquina (Placa)</label>
                <select id="idMaquina"><option value="">Aguardando tipo...</option></select>
                <button class="btn-main" onclick="irParaChecklist()">INICIAR CHECKLIST</button>
                <button class="btn-nav" onclick="abrirDash()">ACESSAR DASHBOARD</button>
            </div>
        </div>

        <div id="tela2" class="screen">
            <div id="banner" style="background:#e1f0ff; padding:12px; border-radius:10px; margin-bottom:15px; font-size:13px; font-weight:bold; color:var(--sv-blue); text-align:center;"></div>
            <div id="checklistArea"></div>
            <label>Observações Gerais</label>
            <textarea id="obs" rows="3"></textarea>
            <button id="btnSalvar" class="btn-main" onclick="salvar()">FINALIZAR INSPEÇÃO</button>
            <button class="btn-nav" onclick="location.reload()">CANCELAR</button>
        </div>

        <div id="telaDash" class="screen">
            <h2 style="color: var(--sv-blue); margin-top: 0;">Dashboard</h2>
            <div class="filter-grid">
                <div>
                    <label>Período</label>
                    <select id="fPeriodo" onchange="renderDash()">
                        <option value="7">7 Dias</option>
                        <option value="30">30 Dias</option>
                        <option value="0">Tudo</option>
                    </select>
                </div>
                <div>
                    <label>Máquina</label>
                    <select id="fMaq" onchange="renderDash()"><option value="">Todas</option></select>
                </div>
            </div>

            <div class="dash-card">
                <div class="dash-title">Checklists Realizados</div>
                <div id="totalChecks" class="stat-number">0</div>
            </div>

            <div class="dash-card">
                <div class="dash-title">Itens com mais Falhas (NOK)</div>
                <table id="tableItens"><tbody></tbody></table>
            </div>

            <div class="dash-card">
                <div class="dash-title">Caminhões c/ mais Problemas</div>
                <table id="tableMaqNok"><tbody></tbody></table>
            </div>

            <button class="btn-main" onclick="location.reload()">VOLTAR AO INÍCIO</button>
        </div>
    </div>
</div>

<script>
    // ⚠️ COLOQUE SUA URL AQUI:
    const URL_API = "https://script.google.com/macros/s/AKfycby1TA5qgRDu7NAbgaSnIcK56lhZAVwVl9oELrc-WtBMZGzfOngA-emYxhWTnfMBdBO9/exec"; 

    let dMaquinas = [], dItens = [], dHistorico = [];

    window.onload = async () => {
        try {
            const res = await fetch(URL_API);
            const data = await res.json();
            dMaquinas = data.maquinas; dItens = data.itens; dHistorico = data.historico || [];
            
            const selT = document.getElementById('tipoMaquina');
            const tipos = [...new Set(dMaquinas.map(m => m.tipo_maquina))];
            tipos.forEach(t => { if(t) selT.innerHTML += `<option value="${t}">${t}</option>`; });
            
            const selF = document.getElementById('fMaq');
            const ids = [...new Set(dMaquinas.map(m => m.id_maquina))];
            ids.forEach(id => selF.innerHTML += `<option value="${id}">${id}</option>`);

            document.getElementById('statusLoad').style.display = 'none';
            document.getElementById('formInicial').style.display = 'block';
        } catch (e) { document.getElementById('statusLoad').innerText = "Erro na conexão."; }
    };

    function filtraIDs() {
        const t = document.getElementById('tipoMaquina').value;
        const s = document.getElementById('idMaquina');
        s.innerHTML = '<option value="">Selecione...</option>';
        dMaquinas.filter(m => m.tipo_maquina === t).forEach(m => {
            s.innerHTML += `<option value="${m.id_maquina}">${m.id_maquina}</option>`;
        });
    }

    function irParaChecklist() {
        const op = document.getElementById('operador').value, id = document.getElementById('idMaquina').value, t = document.getElementById('tipoMaquina').value;
        if(!op || !id) return alert("Preencha Operador e Máquina!");
        const maq = dMaquinas.find(m => m.id_maquina === id);
        document.getElementById('banner').innerText = `ID: ${id} | PLACA: ${maq.placa || 'N/A'}`;
        const area = document.getElementById('checklistArea'); area.innerHTML = "";
        const itensF = dItens.filter(i => i.tipo_maquina === t);
        const cats = [...new Set(itensF.map(i => i.categoria))];
        cats.forEach(c => {
            let h = `<div class="category-block"><div class="category-title">${c}</div>`;
            itensF.filter(i => i.categoria === c).forEach(it => {
                h += `<div class="item-row"><span>${it.item}</span><select class="res-check" data-name="${it.item}"><option value="OK">OK</option><option value="NOK">NOK</option></select></div>`;
            });
            area.innerHTML += h + `</div>`;
        });
        document.getElementById('tela1').classList.remove('active'); document.getElementById('tela2').classList.add('active');
        window.scrollTo(0,0);
    }

    async function salvar() {
        const btn = document.getElementById('btnSalvar'); if(btn.disabled) return;
        btn.disabled = true; btn.innerText = "SALVANDO...";
        const resps = Array.from(document.querySelectorAll('.res-check')).map(s => { return { item: s.dataset.name, status: s.value }; });
        const payload = {
            operador: document.getElementById('operador').value,
            tipoMaquina: document.getElementById('tipoMaquina').value,
            idMaquina: document.getElementById('idMaquina').value,
            placa: dMaquinas.find(m => m.id_maquina === document.getElementById('idMaquina').value).placa,
            respostas: resps, observacao: document.getElementById('obs').value
        };
        try {
            await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("✅ Checklist Enviado!"); location.reload();
        } catch (e) { alert("Erro ao salvar."); btn.disabled = false; }
    }

    function abrirDash() {
        document.getElementById('tela1').classList.remove('active');
        document.getElementById('telaDash').classList.add('active');
        renderDash();
    }

    function renderDash() {
        const per = parseInt(document.getElementById('fPeriodo').value), maqF = document.getElementById('fMaq').value, hoje = new Date();
        let filtrados = dHistorico.filter(d => {
            const diff = (hoje - new Date(d.data)) / (1000*60*60*24);
            return (per === 0 || diff <= per) && (maqF === "" || d.id_maquina == maqF);
        });

        const totalUnico = new Set(filtrados.map(f => f.data + f.id_maquina)).size;
        document.getElementById('totalChecks').innerText = totalUnico;

        const itensNok = {}, maqsNok = {};
        filtrados.forEach(f => {
            if(f.status === "NOK") {
                itensNok[f.item] = (itensNok[f.item] || 0) + 1;
                maqsNok[f.id_maquina] = (maqsNok[f.id_maquina] || 0) + 1;
            }
        });

        const gerarTabela = (obj, id) => {
            const sorted = Object.entries(obj).sort((a,b) => b[1] - a[1]).slice(0,5);
            document.querySelector(`#${id} tbody`).innerHTML = sorted.map(e => `<tr><td>${e[0]}</td><td class="nok-count">${e[1]} NOK</td></tr>`).join('');
        };
        gerarTabela(itensNok, 'tableItens'); gerarTabela(maqsNok, 'tableMaqNok');
    }
</script>
</body>
</html>
