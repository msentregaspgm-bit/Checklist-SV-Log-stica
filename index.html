<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SV Gestão - Dashboard Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#005697">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --sv-blue: #005697; --sv-yellow: #FDB813; --sv-bg: #f4f6f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--sv-bg); margin: 0; padding-top: env(safe-area-inset-top); display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 500px; min-height: 100vh; background: white; display: flex; flex-direction: column; }
        .header { background: var(--sv-blue); color: var(--sv-yellow); padding: 15px; text-align: center; font-weight: 800; text-transform: uppercase; }
        .header img { max-width: 100px; display: block; margin: 0 auto 5px; }
        .p-20 { padding: 20px; flex: 1; }
        .screen { display: none; }
        .active { display: block; }
        
        /* Filtros Dashboard */
        .filter-section { background: #eee; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 12px; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { font-weight: bold; color: var(--sv-blue); display: block; margin-bottom: 4px; }
        select, input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        
        /* Cards do Dash */
        .dash-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .dash-title { font-size: 11px; color: #777; text-transform: uppercase; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #eee; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: var(--sv-blue); }
        
        canvas { max-width: 100%; margin-top: 10px; }

        .btn-main { background: var(--sv-yellow); color: #1a1d20; width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-nav { background: #e1e5eb; color: var(--sv-blue); width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        td { padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
        .nok { color: #d32f2f; font-weight: bold; text-align: right; }
    </style>
</head>
<body>
<div class="app-card">
    <div class="header">
        <img src="logo.png" alt="SV">
        GESTÃO SV LOGÍSTICA
    </div>

    <div class="p-20">
        <div id="tela1" class="screen active">
            <button class="btn-main" onclick="abrirChecklist()">Novo Checklist</button>
            <button class="btn-nav" onclick="abrirDash()">Ver Dashboard</button>
            <div id="statusLoad" style="text-align:center; margin-top:20px; font-size:12px; color:#999;">Sincronizando...</div>
        </div>

        <div id="telaDash" class="screen">
            <div class="filter-section">
                <div class="filter-grid">
                    <div>
                        <label>Início</label>
                        <input type="date" id="fDataInicio" onchange="renderDash()">
                    </div>
                    <div>
                        <label>Fim</label>
                        <input type="date" id="fDataFim" onchange="renderDash()">
                    </div>
                </div>
                <div class="filter-grid">
                    <div>
                        <label>Operador</label>
                        <select id="fOperador" onchange="renderDash()"><option value="">Todos</option></select>
                    </div>
                    <div>
                        <label>Caminhão</label>
                        <select id="fCaminhao" onchange="renderDash()"><option value="">Todos</option></select>
                    </div>
                </div>
            </div>

            <div class="dash-card">
                <div class="stat-row">
                    <div class="dash-title">Total de Inspeções</div>
                    <div id="totalChecks" class="stat-number">0</div>
                </div>
            </div>

            <div class="dash-card">
                <div class="dash-title">Status dos Itens (Geral)</div>
                <canvas id="chartPizza" height="200"></canvas>
            </div>

            <div class="dash-card">
                <div class="dash-title">Ranking de Falhas (Itens)</div>
                <canvas id="chartBarras" height="250"></canvas>
            </div>

            <div class="dash-card">
                <div class="dash-title">Top 5 Caminhões c/ Problemas</div>
                <table id="tableMaquinas"><tbody></tbody></table>
            </div>

            <button class="btn-nav" onclick="location.reload()">Sair do Dashboard</button>
        </div>
        
        </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycby1TA5qgRDu7NAbgaSnIcK56lhZAVwVl9oELrc-WtBMZGzfOngA-emYxhWTnfMBdBO9/exec"; 
    let dMaquinas = [], dItens = [], dHistorico = [];
    let chartP, chartB;

    window.onload = async () => {
        try {
            const res = await fetch(URL_API);
            const data = await res.json();
            dMaquinas = data.maquinas; dItens = data.itens; dHistorico = data.historico || [];
            
            // Preencher filtros
            const opSel = document.getElementById('fOperador');
            const maqSel = document.getElementById('fCaminhao');
            
            [...new Set(dHistorico.map(h => h.operador))].forEach(op => { if(op) opSel.innerHTML += `<option value="${op}">${op}</option>`; });
            [...new Set(dMaquinas.map(m => m.id_maquina))].forEach(id => { if(id) maqSel.innerHTML += `<option value="${id}">${id}</option>`; });

            // Datas padrão (últimos 30 dias)
            const dFinal = new Date();
            const dInicio = new Date(); dInicio.setDate(dFinal.getDate() - 30);
            document.getElementById('fDataInicio').value = dInicio.toISOString().split('T')[0];
            document.getElementById('fDataFim').value = dFinal.toISOString().split('T')[0];

            document.getElementById('statusLoad').innerText = "Dados atualizados.";
        } catch (e) { alert("Erro ao carregar dados."); }
    };

    function abrirDash() {
        document.getElementById('tela1').classList.remove('active');
        document.getElementById('telaDash').classList.add('active');
        renderDash();
    }

    function renderDash() {
        const dataI = new Date(document.getElementById('fDataInicio').value);
        const dataF = new Date(document.getElementById('fDataFim').value);
        dataF.setHours(23, 59, 59);
        
        const opF = document.getElementById('fOperador').value;
        const maqF = document.getElementById('fCaminhao').value;

        // Filtragem
        let filtrados = dHistorico.filter(d => {
            const dt = new Date(d.data);
            const bateData = dt >= dataI && dt <= dataF;
            const bateOp = opF === "" || d.operador === opF;
            const bateMaq = maqF === "" || d.id_maquina == maqF;
            return bateData && bateOp && bateMaq;
        });

        // Totais e Cálculos
        const totalUnico = new Set(filtrados.map(f => f.data + f.id_maquina)).size;
        document.getElementById('totalChecks').innerText = totalUnico;

        let ok = 0, nok = 0;
        const countItens = {}, countMaqs = {};

        filtrados.forEach(f => {
            if(f.status === "OK") ok++;
            else {
                nok++;
                countItens[f.item] = (countItens[f.item] || 0) + 1;
                countMaqs[f.id_maquina] = (countMaqs[f.id_maquina] || 0) + 1;
            }
        });

        // Atualizar Gráfico de Pizza
        if(chartP) chartP.destroy();
        chartP = new Chart(document.getElementById('chartPizza'), {
            type: 'doughnut',
            data: {
                labels: ['OK', 'Com Falha'],
                datasets: [{ data: [ok, nok], backgroundColor: ['#28a745', '#d32f2f'] }]
            },
            options: { plugins: { legend: { position: 'bottom' } } }
        });

        // Atualizar Gráfico de Barras (Ranking Itens)
        const sortedItens = Object.entries(countItens).sort((a,b) => b[1] - a[1]).slice(0, 7);
        if(chartB) chartB.destroy();
        chartB = new Chart(document.getElementById('chartBarras'), {
            type: 'bar',
            data: {
                labels: sortedItens.map(i => i[0]),
                datasets: [{ label: 'Qtd NOK', data: sortedItens.map(i => i[1]), backgroundColor: varColor('--sv-blue') }]
            },
            options: { indexAxis: 'y', plugins: { legend: { display: false } } }
        });

        // Tabela de Máquinas
        const sortedMaqs = Object.entries(countMaqs).sort((a,b) => b[1] - a[1]).slice(0, 5);
        document.querySelector('#tableMaquinas tbody').innerHTML = sortedMaqs.map(m => 
            `<tr><td>${m[0]}</td><td class="nok">${m[1]} falhas</td></tr>`
        ).join('');
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
</script>
</body>
</html>
